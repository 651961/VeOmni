# Qwen-Image-Edit-2511 SFT config.
#
# Same yaml drives two modes via train.training_task:
#   - offline_embedding : 一次性把 VAE latents + prompt embedding 写进 parquet
#   - offline_training  : 训练时从 parquet cache 直接读 embedding（无 VAE/text encoder）
#
# (online_training 本期不实现 — raw PIL → vae-sized PIL resize 链与参照实现
#  尚未对齐，对齐成本高于收益。)
#
# Field defaults are tuned for full-parameter SFT on a single 8×80GB node;
# CLI overrides (e.g. --train.global_batch_size 8) apply on top.

model:
  config_path: /models/Qwen-Image-Edit-2511/transformer
  model_path: /models/Qwen-Image-Edit-2511/transformer
  condition_model_path: /models/Qwen-Image-Edit-2511
  model_config:
    # bf16 outlier guard on the flow-matching MSE: any element whose
    # |pred - target| exceeds the threshold is zeroed before the spatial
    # mean. Off by default (null); set e.g. 50.0 if you see gradient norm
    # spikes traceable to a handful of exploding elements.
    loss_outlier_threshold: null
  # condition_model_cfg drives preprocessing scalars consumed by the
  # condition model (VAE + text encoder) and the DiT's zero-cond branch.
  # Two distinct image-area knobs:
  #   - vae_image_area=1024^2 : 给 VAE 用的 edit/target image size
  #   - condition_image_area=384^2 : 给 Qwen2.5-VL vision tower 用的
  # 它们是两个独立 area，不是同一个值。
  condition_model_cfg:
    target_max_pixels: 1048576     # 1024 * 1024 — 主图 (target) area cap
    target_size_alignment: 16      # 主图边长对齐 16
    vae_image_area: 1048576        # 1024 * 1024 — edit image 进 VAE 前 area
    vae_image_alignment: 32        # edit image 边长对齐 32
    condition_image_area: 147456   # 384 * 384 — edit image 进 vision tower 前 area
    condition_image_alignment: 32  # condition image 边长对齐 32
    zero_cond_t: true              # QIE-2511 训练默认开 zero_cond_t
  ops_implementation:
    attn_implementation: flash_attention_2

data:
  datasets_type: mapping
  data_type: diffusion
  text_keys: prompt
  train_path: /path/to/train_parquet
  offline_embedding_save_dir: /path/to/train_offline_embedding
  source_name: Qwen-Image-Edit-2511
  mm_configs: {}
  dataloader:
    type: native
    drop_last: true
    num_workers: 4
    pin_memory: true
    prefetch_factor: 2

train:
  accelerator:
    ulysses_size: 1
    dp_shard_size: 8
    fsdp_config:
      fsdp_mode: fsdp2
      mixed_precision:
        enable: false
  gradient_checkpointing:
    enable: true
  global_batch_size: 64
  micro_batch_size: 1
  init_device: meta
  num_train_epochs: 80
  training_task: offline_training
  optimizer:
    type: adamw
    lr: 1.0e-4
    lr_min: 1.0e-7
    lr_warmup_ratio: 0.025
    lr_decay_style: constant
    weight_decay: 0.001
    max_grad_norm: 1.0
  checkpoint:
    output_dir: /path/to/checkpoints/qwen_image_edit_2511_runs
    save_async: true
    save_steps: 1000
    save_epochs: 0
    save_hf_weights: false
  wandb:
    enable: false
    project: Qwen-Image-Edit-2511-SFT
    name: qie2511-sft
